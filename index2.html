<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAR AZUL - Solicitud de Envío</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f3f5f7;
color:#111;
overflow-x:hidden;
}

/* HERO */

.hero{
width:100%;
min-height:55vh;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url('https://images.unsplash.com/photo-1494412651409-8963ce7935a7?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
}

.hero-content{
max-width:900px;
color:white;
}

.hero h1{
font-size:clamp(3rem,8vw,6rem);
letter-spacing:4px;
margin-bottom:20px;
}

.hero p{
font-size:1.1rem;
line-height:1.8;
color:#e8e8e8;
}

/* CONTENIDO */

.container{
max-width:1300px;
margin:auto;
padding:60px 20px;
}

/* CLIENTE */

.cliente-box{
background:white;
padding:35px;
border-radius:30px;
box-shadow:0 8px 30px rgba(0,0,0,0.07);
margin-bottom:50px;
}

.cliente-box h2{
font-size:2rem;
margin-bottom:25px;
}

.cliente{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.cliente input{
flex:1;
min-width:250px;
padding:20px;
border:none;
background:#f5f5f5;
border-radius:18px;
font-size:1rem;
outline:none;
}

/* GRID PRODUCTOS */

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:35px;
}

/* CARD */

.product{
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 8px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:240px;
object-fit:cover;
display:block;
}

.product-content{
padding:25px;
}

.product h3{
font-size:2rem;
margin-bottom:20px;
}

.range-box{
margin-top:20px;
}

input[type="range"]{
width:100%;
cursor:pointer;
}

.range-info{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:1rem;
}

.price{
margin-top:20px;
font-size:1.7rem;
font-weight:bold;
color:#0b2c5f;
}

/* TOTAL */

.total-section{
margin-top:70px;
background:white;
padding:50px;
border-radius:35px;
box-shadow:0 8px 30px rgba(0,0,0,0.07);
text-align:center;
}

.total-section h2{
font-size:3rem;
margin-bottom:20px;
}

.total{
font-size:4rem;
color:#0b2c5f;
font-weight:bold;
}

/* PAGOS */

.payments{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.payments button{
padding:18px 35px;
border:none;
border-radius:50px;
background:#ececec;
cursor:pointer;
font-size:1rem;
transition:0.3s;
}

.payments button:hover{
background:#d9d9d9;
}

#pagoEstado{
margin-top:25px;
font-size:1rem;
}

/* BOTON */

.send-box{
margin-top:50px;
text-align:center;
}

.send-btn{
background:#0b2c5f;
color:white;
border:none;
padding:24px 70px;
font-size:1.1rem;
border-radius:60px;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.send-btn:hover{
transform:translateY(-4px);
background:#15448d;
}

/* RESPONSIVE */

@media(max-width:768px){

.hero{
min-height:45vh;
}

.product img{
height:220px;
}

.total{
font-size:2.8rem;
}

.total-section h2{
font-size:2rem;
}

}

</style>
</head>

<body>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>MAR AZUL</h1>

<p>
Sistema moderno de solicitud de exportación marítima
para granos básicos. Seleccione los productos,
cantidades y envíe su orden directamente a WhatsApp.
</p>

</div>

</section>

<!-- CONTENIDO -->

<div class="container">

<!-- CLIENTE -->

<div class="cliente-box">

<h2>Información del Cliente</h2>

<div class="cliente">

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="apellido" placeholder="Apellido">

</div>

</div>

<!-- PRODUCTOS -->

<div class="product-grid" id="productos"></div>

<!-- TOTAL -->

<div class="total-section">

<h2>Total General</h2>

<div class="total" id="totalGeneral">
C$ 0
</div>

<div class="payments">

<button onclick="setPago('Transferencia bancaria')">
Transferencia
</button>

<button onclick="setPago('Pago en efectivo')">
Efectivo
</button>

<button onclick="setPago('Pago contra entrega')">
Contra entrega
</button>

</div>

<p id="pagoEstado"></p>

<div class="send-box">

<button class="send-btn" onclick="enviar()">
Enviar Pedido a WhatsApp
</button>

</div>

</div>

</div>

<script>

/* PRODUCTOS */

const productos = [

{
n:"Arroz",
p:1450,
img:"imagenes/arroz.png"
},

{
n:"Frijoles Rojos",
p:3200,
img:"imagenes/frijolesr.png"
},

{
n:"Frijoles Negros",
p:3000,
img:"imagenes/frijolesn.png"
},

{
n:"Maíz",
p:900,
img:"imagenes/maiz.png"
},

{
n:"Trigo",
p:2600,
img:"imagenes/trigo.png"
}

];

let cantidades = [0,0,0,0,0];
let pago = "";

/* RENDER */

function render(){

const cont = document.getElementById("productos");

productos.forEach((x,i)=>{

cont.innerHTML += `

<div class="product">

<img src="${x.img}">

<div class="product-content">

<h3>${x.n}</h3>

<div class="range-box">

<input
type="range"
min="0"
max="20"
value="0"
oninput="update(${i},this.value)">

<div class="range-info">

<p>
Quintales:
<span id="q${i}">0</span>
</p>

<p>
C$ ${x.p} c/u
</p>

</div>

</div>

<p class="price" id="p${i}">
C$ 0
</p>

</div>

</div>

`;

});

calc();

}

/* UPDATE */

function update(i,val){

cantidades[i]=val;

calc();

}

/* CALCULAR */

function calc(){

let total = 0;

productos.forEach((x,i)=>{

let cant = Number(cantidades[i]);

let sub = x.p * cant;

document.getElementById("q"+i).innerText = cant;

document.getElementById("p"+i).innerText =
"C$ " + sub.toLocaleString();

total += sub;

});

document.getElementById("totalGeneral").innerText =
"C$ " + total.toLocaleString();

}

/* PAGO */

function setPago(tipo){

pago = tipo;

document.getElementById("pagoEstado").innerText =
"Método seleccionado: " + tipo + " ✅";

}

/* WHATSAPP */

function enviar(){

let nombre =
document.getElementById("nombre").value;

let apellido =
document.getElementById("apellido").value;

if(nombre == "" || apellido == ""){

alert("Complete nombre y apellido");

return;

}

let msg = "🌊 MAR AZUL EXPORT 🌊\n\n";

msg +=
"Cliente: " +
nombre + " " + apellido + "\n\n";

productos.forEach((x,i)=>{

if(cantidades[i] > 0){

msg +=
"• " + x.n +
"\n" +
cantidades[i] +
" quintales" +
"\nSubtotal: C$ " +
(x.p*cantidades[i]).toLocaleString()
+ "\n\n";

}

});

msg +=
"Pago: " + pago + "\n\n";

msg +=
"Total General: " +
document.getElementById("totalGeneral").innerText;

let url =
"https://wa.me/50588887777?text=" +
encodeURIComponent(msg);

window.open(url,"_blank");

}

/* INICIAR */

render();

</script>

</body>
</html>
